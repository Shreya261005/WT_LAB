<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Object - Exercise 2 (Interactive)</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    .form-group { margin: 15px 0; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 20px; background: #007cba; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .result { margin-top: 20px; padding: 15px; background: #f0f8ff; border-left: 4px solid #007cba; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Exercise 2: ES6 Object Destructuring & Spread</h2>

  <div class="form-group">
    <label>ID:</label>
    <input type="number" id="id" placeholder="101" />
  </div>
  <div class="form-group">
    <label>Name:</label>
    <input type="text" id="name" placeholder="Priya" />
  </div>
  <div class="form-group">
    <label>Department:</label>
    <input type="text" id="department" placeholder="CSE" />
  </div>
  <div class="form-group">
    <label>Marks:</label>
    <input type="number" id="marks" placeholder="92" min="0" max="100" />
  </div>

  <button onclick="processStudent()">Process Student</button>

  <div id="output"></div>

  <script>
    function processStudent() {
      const student = {
        id: parseInt(document.getElementById("id").value) || 101,
        name: document.getElementById("name").value || "Priya",
        department: document.getElementById("department").value || "CSE",
        marks: parseFloat(document.getElementById("marks").value) || 92
      };

      // ES6 Object Destructuring
      const {id, name, department, marks} = student;
      
      // Grade based on marks
      const grade = marks >= 90 ? "A" : marks >= 80 ? "B" : "C";

      // ES6 Spread operator
      const updatedStudent = {
        ...student,
        grade: grade
      };

      document.getElementById("output").innerHTML = `
        <div class="result">
          <h3>Destructured Values:</h3>
          <pre>${id} ${name} ${department} ${marks}</pre>
          
          <h3>Updated Student:</h3>
          <pre>${JSON.stringify(updatedStudent, null, 2)}</pre>
        </div>
      `;

      // Console output (exact match)
      console.log(id, name, department, marks);
      console.log(updatedStudent);
    }
  </script>
</body>
</html>
